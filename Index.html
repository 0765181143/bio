<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Sprinter by C.Cường</title>

<link rel="stylesheet" href="style.css">

<script src="https://unpkg.com/@zxing/library@latest"></script>
<script src="https://cdn.jsdelivr.net/npm/jsbarcode"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<header>
<img src="logo.png" class="logo">
<h1>Sprinter by C.Cường</h1>
</header>

<div class="container">

<h2>Scanner</h2>

<video id="video"></video>

<div class="controls">

<button onclick="toggleFlash()">Flash</button>
<button onclick="startScanner()">Start Scan</button>

</div>

<div id="notify"></div>

<h2>Danh sách quét</h2>

<ul id="scanList"></ul>

<button onclick="confirmOrders()">Xác nhận đơn</button>

<hr>

<h2>Tạo Barcode</h2>

<input id="barcodeText">

<button onclick="createBarcode()">Tạo</button>

<svg id="barcode"></svg>

<h2>Tạo QR</h2>

<canvas id="qr"></canvas>

<button onclick="createQR()">Tạo QR</button>

<hr>

<h2>In tem vận đơn</h2>

<input id="printCode">

<button onclick="printLabel()">In tem</button>

<hr>

<h2>Dashboard</h2>

<canvas id="chart"></canvas>

<hr>

<h2>Lịch sử hoạt động</h2>

<ul id="historyList"></ul>

</div>

<script src="scanner.js"></script>
<script src="orders.js"></script>
<script src="barcode.js"></script>
<script src="print.js"></script>
<script src="dashboard.js"></script>
<script src="shop.js"></script>
<script src="history.js"></script>

</body>
</html>
