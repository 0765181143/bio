<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Shipper PRO MAX</title>

<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>

<style>

body{
font-family:-apple-system,BlinkMacSystemFont,Segoe UI;
background:#0f1220;
color:white;
margin:0;
}

header{
background:#ff0033;
padding:14px;
font-weight:bold;
text-align:center;
font-size:18px;
}

.container{
padding:12px;
max-width:700px;
margin:auto;
}

.card{
background:#181c2f;
padding:12px;
border-radius:12px;
margin-bottom:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.3);
}

input,button{
padding:9px;
margin:4px;
border:none;
border-radius:8px;
}

button{
background:#ff0033;
color:white;
cursor:pointer;
}

#reader{
width:100%;
}

.item{
background:#11142a;
padding:8px;
margin-top:6px;
border-radius:8px;
display:flex;
justify-content:space-between;
align-items:center;
}

.done{
color:#3cff74;
}

.todo{
color:#ffc400;
}

#toast{
position:fixed;
top:15px;
left:50%;
transform:translateX(-50%);
background:#222;
padding:10px 15px;
border-radius:8px;
display:none;
}

.stats{
margin-top:5px;
font-size:14px;
opacity:0.8;
}

</style>

</head>

<body>

<header>Shipper PRO MAX</header>

<div class="container">

<div class="card">

<h3>📷 Quét đơn</h3>

<div id="reader"></div>

</div>

<div class="card">

<h3>➕ Thêm đơn</h3>

<input id="codeInput" placeholder="Mã vận đơn">

<button onclick="addOrder()">Thêm</button>

</div>

<div class="card">

<h3>🔎 Tìm đơn</h3>

<input id="search" placeholder="Tìm mã vận đơn" oninput="update()">

</div>

<div class="card">

<h3>🔳 Tạo QR + Barcode</h3>

<input id="genCode" placeholder="Nhập mã vận đơn">

<button onclick="createCode()">Tạo</button>

<h4>QR Code</h4>

<div id="qrcode"></div>

<h4>Barcode</h4>

<svg id="barcode"></svg>

</div>

<div class="card">

<h3>📊 Thống kê</h3>

<div id="stats"></div>

</div>

<div class="card">

<h3>📦 Danh sách đơn</h3>

<div id="list"></div>

</div>

</div>

<div id="toast"></div>

<script>

let orders=JSON.parse(localStorage.getItem("orders")||"[]")

let today=new Date().toLocaleDateString()

function save(){

localStorage.setItem("orders",JSON.stringify(orders))

}

function toast(text){

let box=document.getElementById("toast")

box.innerText=text

box.style.display="block"

setTimeout(()=>{

box.style.display="none"

},1500)

}

function addOrder(){

let code=document.getElementById("codeInput").value

if(!code)return

orders.push({

code:code,

done:false,

date:today

})

save()

update()

}

function toggle(code){

let o=orders.find(x=>x.code===code)

if(o){

o.done=true

toast("Đã lấy "+code)

}

save()

update()

}

function del(code){

orders=orders.filter(x=>x.code!==code)

save()

update()

}

function update(){

let list=document.getElementById("list")

let search=document.getElementById("search").value.toLowerCase()

list.innerHTML=""

let done=0

let data=orders.filter(o=>o.code.toLowerCase().includes(search))

data.forEach(o=>{

if(o.done)done++

let div=document.createElement("div")

div.className="item"

div.innerHTML=

"<span>"+o.code+"</span>"+

"<span class='"+(o.done?"done":"todo")+"'>"+

(o.done?"Đã lấy":"Chưa")+

"</span>"+

"<button onclick=\"toggle('"+o.code+"')\">✓</button>"+

"<button onclick=\"del('"+o.code+"')\">X</button>"

list.appendChild(div)

})

document.getElementById("stats").innerText=

"Tổng: "+data.length+" | Đã lấy: "+done+" | Chưa: "+(data.length-done)

}

function createCode(){

let text=document.getElementById("genCode").value

if(!text)return

let qr=document.getElementById("qrcode")

qr.innerHTML=""

new QRCode(qr,{

text:text,

width:200,

height:200

})

JsBarcode("#barcode",text,{

format:"CODE128",

width:2,

height:80,

displayValue:true

})

}

function onScanSuccess(code){

let o=orders.find(x=>x.code===code)

if(o){

o.done=true

toast("Đã lấy "+code)

}else{

orders.push({

code:code,

done:true,

date:today

})

toast("Đơn mới "+code)

}

save()

update()

}

let scanner=new Html5QrcodeScanner(

"reader",

{

fps:30,

qrbox:220

}

)

scanner.render(onScanSuccess)

update()

</script>

</body>
</html>
