<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width,initial-scale=1">

<title>SPRINTER ULTRA PRO MAX</title>

<link rel="stylesheet" href="style.css">

<link rel="icon" href="https://cdn-icons-png.flaticon.com/512/1041/1041888.png">

<script src="https://unpkg.com/@zxing/library@latest"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsbarcode"></script>

</head>

<body>

<header>

<img src="https://cdn-icons-png.flaticon.com/512/1041/1041888.png">

<h2>SPRINTER ULTRA PRO MAX</h2>

</header>

<div class="menu">

<button onclick="openPage('scan')">📷 Scan</button>
<button onclick="openPage('orders')">📦 Orders</button>
<button onclick="openPage('dashboard')">📊 Dashboard</button>
<button onclick="openPage('qr')">🔳 QR</button>
<button onclick="printLabel()">🧾 Print</button>
<button onclick="openMap()">📍 Map</button>

</div>

<div id="scan" class="page">

<video id="video"></video>

<p id="scanResult">Waiting scan...</p>

</div>

<div id="orders" class="page">

<input id="manualCode" placeholder="Manual code">

<button onclick="addManual()">Add</button>

<table id="ordersTable"></table>

</div>

<div id="dashboard" class="page">

<canvas id="chart"></canvas>

</div>

<div id="qr" class="page">

<input id="qrText">

<button onclick="makeQR()">QR</button>

<button onclick="makeBarcode()">Barcode</button>

<canvas id="qrCanvas"></canvas>

<svg id="barcode"></svg>

</div>

<script src="scanner.js"></script>
<script src="system.js"></script>

</body>
</html>
