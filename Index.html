<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>SPRINTER</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">

<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdn.jsdelivr.net/npm/jsbarcode"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
margin:0;
background:#0b1220;
font-family:Arial;
color:white;
}

header{
background:#ff0033;
padding:15px;
text-align:center;
font-size:20px;
font-weight:bold;
}

.container{
max-width:500px;
margin:auto;
padding:10px;
}

.card{
background:#1e293b;
padding:12px;
border-radius:12px;
margin-bottom:10px;
}

button{
background:#ff0033;
border:none;
color:white;
padding:8px 12px;
border-radius:8px;
}

input{
padding:8px;
border-radius:8px;
border:none;
margin-top:6px;
}

.order{
display:flex;
justify-content:space-between;
padding:6px;
border-bottom:1px solid #334155;
}

#reader{
width:100%;
margin-top:10px;
}

</style>

</head>

<body>

<header>SPRINTER Tool by Cao Cường</header>

<div class="container">

<div class="card">

<h3>📷 Scan đơn</h3>

<button onclick="startScan()">Bật camera</button>
<button onclick="stopScan()">Tắt camera</button>

<div id="reader"></div>

</div>

<div class="card">

<h3>➕ Thêm đơn</h3>

<input id="manual" placeholder="Mã vận đơn">

<button onclick="addManual()">Thêm</button>

</div>

<div class="card">

<h3>🔍 Tìm đơn</h3>

<input id="search" placeholder="Tìm mã" onkeyup="searchOrder()">

</div>

<div class="card">

<h3>📦 Danh sách đơn</h3>

<div id="orders"></div>

</div>

<div class="card">

<h3>🧾 Tạo QR + Barcode</h3>

<input id="code" placeholder="Nhập mã">

<button onclick="createCode()">Tạo</button>

<div id="qr"></div>

<svg id="barcode"></svg>

</div>

<div class="card">

<h3>📊 Thống kê</h3>

<canvas id="chart"></canvas>

</div>

</div>

<script>

let orders=JSON.parse(localStorage.getItem("orders")||"[]")

function save(){
localStorage.setItem("orders",JSON.stringify(orders))
}

function addOrder(code){

if(!code)return

let found=orders.find(o=>o.code==code)

if(found){

found.taken=true

navigator.vibrate(200)

}else{

orders.push({
code:code,
taken:false,
date:new Date().toLocaleDateString()
})

}

save()

render()

}

function addManual(){

let code=document.getElementById("manual").value

addOrder(code)

}

function deleteOrder(code){

orders=orders.filter(o=>o.code!=code)

save()

render()

}

function render(){

let box=document.getElementById("orders")

box.innerHTML=""

orders.forEach(o=>{

let div=document.createElement("div")

div.className="order"

div.innerHTML=
o.code+" "+(o.taken?"✅":"⏳")+
`<button onclick="deleteOrder('${o.code}')">X</button>`

box.appendChild(div)

})

updateChart()

}

function searchOrder(){

let key=document.getElementById("search").value

let box=document.getElementById("orders")

box.innerHTML=""

orders.filter(o=>o.code.includes(key)).forEach(o=>{

let div=document.createElement("div")

div.className="order"

div.innerText=o.code

box.appendChild(div)

})

}

function createCode(){

let code=document.getElementById("code").value

document.getElementById("qr").innerHTML=""

new QRCode(document.getElementById("qr"),{
text:code,
width:200,
height:200
})

JsBarcode("#barcode",code)

}

let scanner

function startScan(){

scanner=new Html5Qrcode("reader")

scanner.start(
{facingMode:"environment"},
{
fps:30,
qrbox:250
},
(code)=>{
addOrder(code)
}
)

}

function stopScan(){

if(scanner){
scanner.stop()
}

}

let chart=new Chart(
document.getElementById("chart"),
{
type:"doughnut",
data:{
labels:["Đã lấy","Chưa lấy"],
datasets:[{
data:[0,0]
}]
}
}
)

function updateChart(){

let taken=orders.filter(o=>o.taken).length

chart.data.datasets[0].data=[taken,orders.length-taken]

chart.update()

}

render()

</script>

</body>
</html>
