<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>SPRINTER</title>

<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdn.jsdelivr.net/npm/jsbarcode"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- FIREBASE REALTIME -->
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#eef2f7;
}

header{
background:linear-gradient(90deg,#ff3d00,#ff9100);
color:white;
padding:15px;
text-align:center;
font-size:22px;
}

.section{
background:white;
margin:10px;
padding:12px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.dashboard{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
padding:10px;
}

.card{
background:white;
padding:15px;
border-radius:10px;
text-align:center;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.order{
display:flex;
justify-content:space-between;
padding:6px;
border-bottom:1px solid #eee;
}

button{
background:#ff3d00;
color:white;
border:none;
padding:6px 10px;
border-radius:6px;
}

input{
padding:6px;
margin:4px;
}

#reader{
width:100%;
}

</style>

</head>

<body>

<header>

SPRINTER  
<div style="font-size:12px">Tool by Cao Cường</div>

</header>

<div class="dashboard">

<div class="card">
Tổng<br><span id="total">0</span>
</div>

<div class="card">
Đã lấy<br><span id="taken">0</span>
</div>

<div class="card">
Chưa lấy<br><span id="pending">0</span>
</div>

</div>

<div class="section">

<h3>📷 Scan vận đơn</h3>

<button onclick="toggleFlash()">🔦 Flash</button>

<div id="reader"></div>

</div>

<div class="section">

<h3>📦 Danh sách đơn</h3>

<input id="manual" placeholder="Nhập mã">

<button onclick="addManual()">Thêm</button>

<input id="search" placeholder="Tìm đơn" onkeyup="searchOrder()">

<div id="orders"></div>

</div>

<div class="section">

<h3>📍 Map shop</h3>

<input id="mapAddress" placeholder="Địa chỉ shop">

<button onclick="openMap()">Mở bản đồ</button>

</div>

<div class="section">

<h3>🧾 Tạo QR / Barcode</h3>

<input id="genCode" placeholder="Mã vận đơn">

<button onclick="generate()">Tạo</button>

<div id="qr"></div>

<svg id="barcode"></svg>

</div>

<div class="section">

<h3>📊 Dashboard</h3>

<canvas id="chart"></canvas>

</div>

<script>

/* FIREBASE CONFIG */

const firebaseConfig = {
apiKey: "test",
authDomain: "test",
databaseURL: "https://test.firebaseio.com",
projectId: "test",
};

firebase.initializeApp(firebaseConfig)

let db=firebase.database()

let orders=[]

db.ref("orders").on("value",snap=>{

orders=Object.values(snap.val()||{})

render()

})

function addOrder(code){

let ref=db.ref("orders/"+code)

ref.once("value",snap=>{

if(snap.exists()){

ref.update({taken:true})

}else{

ref.set({

code:code,
taken:false,
time:new Date().toLocaleString()

})

}

})

beep()

navigator.vibrate(200)

}

function addManual(){

let code=document.getElementById("manual").value

addOrder(code)

}

function deleteOrder(code){

db.ref("orders/"+code).remove()

}

function render(){

let box=document.getElementById("orders")

box.innerHTML=""

orders.forEach(o=>{

let div=document.createElement("div")

div.className="order"

div.innerHTML=

o.code+" "+(o.taken?"✅":"⏳")+

` <button onclick="deleteOrder('${o.code}')">X</button>`

box.appendChild(div)

})

updateDash()

}

function updateDash(){

document.getElementById("total").innerText=orders.length

let taken=orders.filter(o=>o.taken).length

document.getElementById("taken").innerText=taken

document.getElementById("pending").innerText=orders.length-taken

chart.data.datasets[0].data=[taken,orders.length-taken]

chart.update()

}

function searchOrder(){

let key=document.getElementById("search").value

let box=document.getElementById("orders")

box.innerHTML=""

orders.filter(o=>o.code.includes(key)).forEach(o=>{

let div=document.createElement("div")

div.className="order"

div.innerText=o.code

box.appendChild(div)

})

}

function generate(){

let code=document.getElementById("genCode").value

document.getElementById("qr").innerHTML=""

new QRCode(document.getElementById("qr"),code)

JsBarcode("#barcode",code)

}

function openMap(){

let addr=document.getElementById("mapAddress").value

window.open("https://www.google.com/maps/search/"+addr)

}

function beep(){

new Audio("https://actions.google.com/sounds/v1/cartoon/pop.ogg").play()

}

let scanner=new Html5Qrcode("reader")

Html5Qrcode.getCameras().then(devices=>{

let cam=devices[devices.length-1].id

scanner.start(cam,{fps:120,qrbox:280},scanSuccess)

})

function scanSuccess(code){

addOrder(code)

}

let flash=false

async function toggleFlash(){

try{

flash=!flash

await scanner.applyVideoConstraints({

advanced:[{torch:flash}]

})

}catch(e){

alert("Camera không hỗ trợ flash")

}

}

let chart=new Chart(

document.getElementById("chart"),

{
type:"doughnut",
data:{
labels:["Đã lấy","Chưa lấy"],
datasets:[{data:[0,0]}]
}
}

)

</script>

</body>

</html>p
