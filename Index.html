<!DOCTYPE html>
<html lang="vi">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>SPRINTER</title>

<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#ff3b3b">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="SPRINTER">

<link rel="apple-touch-icon" href="icon-192.png">

<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsbarcode/dist/JsBarcode.all.min.js"></script>

<style>

body{
margin:0;
font-family:-apple-system;
background:#0c1022;
color:white;
}

header{
background:linear-gradient(90deg,#ff0033,#ff6600);
padding:15px;
text-align:center;
font-size:22px;
}

.container{
padding:10px;
}

.card{
background:#161a33;
padding:12px;
border-radius:12px;
margin-bottom:10px;
}

input,button{
padding:10px;
border-radius:8px;
border:none;
margin:4px;
}

button{
background:#ff0033;
color:white;
}

.dashboard{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
}

.box{
background:#111633;
padding:10px;
text-align:center;
border-radius:10px;
}

.order{
display:flex;
justify-content:space-between;
background:#070a18;
padding:6px;
margin-top:4px;
border-radius:6px;
}

</style>

</head>

<body>

<header>

SPRINTER  
<div style="font-size:12px">Tool by Cao Cường</div>

</header>

<div class="container">

<div class="card dashboard">

<div class="box">
Tổng
<br>
<span id="total">0</span>
</div>

<div class="box">
Đã lấy
<br>
<span id="done">0</span>
</div>

<div class="box">
Chưa lấy
<br>
<span id="pending">0</span>
</div>

</div>

<div class="card">

<h3>Scan vận đơn</h3>

<div id="reader"></div>

</div>

<div class="card">

<h3>Nhập đơn</h3>

<input id="orderInput" placeholder="Mã vận đơn">

<button onclick="addOrder()">Thêm</button>

</div>

<div class="card">

<h3>Danh sách đơn</h3>

<div id="orderList"></div>

</div>

<div class="card">

<h3>Tạo QR / Barcode</h3>

<input id="codeInput">

<button onclick="createCode()">Tạo</button>

<button onclick="printLabel()">In tem</button>

<div id="qrcode"></div>

<svg id="barcode"></svg>

</div>

</div>

<script>

let db=JSON.parse(localStorage.getItem("sprinter")||"[]")

function save(){

localStorage.setItem("sprinter",JSON.stringify(db))

}

function addOrder(){

let code=document.getElementById("orderInput").value

db.push({

code:code,
status:"pending"

})

save()

update()

}

function scanSuccess(code){

let order=db.find(o=>o.code===code)

if(order){

order.status="done"

}

save()

update()

}

function update(){

let list=document.getElementById("orderList")

list.innerHTML=""

db.forEach(o=>{

let status=o.status==="done"?"✅":"❌"

list.innerHTML+=`

<div class="order">

<span>${o.code}</span>

<span>${status}</span>

</div>

`

})

let total=db.length
let done=db.filter(o=>o.status==="done").length

document.getElementById("total").innerText=total
document.getElementById("done").innerText=done
document.getElementById("pending").innerText=total-done

}

function createCode(){

let code=document.getElementById("codeInput").value

document.getElementById("qrcode").innerHTML=""

new QRCode(document.getElementById("qrcode"),code)

JsBarcode("#barcode",code)

}

function printLabel(){

window.print()

}

let scanner=new Html5QrcodeScanner("reader",{fps:60,qrbox:250})

scanner.render(scanSuccess)

update()

if("serviceWorker" in navigator){

navigator.serviceWorker.register("service-worker.js")

}

</script>

</body>
</html>
