<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SPRINTER</title>

<script src="https://cdn.jsdelivr.net/npm/@ericblade/quagga2/dist/quagga.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode"></script>
<script src="https://cdn.jsdelivr.net/npm/jsbarcode"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
margin:0;
background:#0f172a;
font-family:Arial;
color:white;
}

header{
background:#111827;
padding:15px;
font-size:20px;
text-align:center;
}

.container{
padding:10px;
}

.card{
background:#1e293b;
padding:15px;
margin-bottom:12px;
border-radius:12px;
}

button{
background:#2563eb;
border:none;
padding:10px;
border-radius:8px;
color:white;
margin:4px;
}

table{
width:100%;
border-collapse:collapse;
}

td{
padding:8px;
border-bottom:1px solid #334155;
}

#scanner{
width:100%;
height:250px;
}

input{
padding:10px;
border-radius:8px;
border:none;
width:100%;
margin-top:6px;
}

</style>
</head>

<body>

<header>SPRINTER</header>

<div class="container">

<div class="card">
<h3>📷 AI Scan</h3>
<div id="scanner"></div>
<button onclick="startScan()">Start</button>
<button onclick="stopScan()">Stop</button>
</div>

<div class="card">
<h3>📋 Danh sách quét</h3>
<table id="queue"></table>
<button onclick="confirmScan()">Xác nhận</button>
</div>

<div class="card">
<h3>📦 Đơn</h3>
<table id="orders"></table>
</div>

<div class="card">
<h3>📊 Dashboard</h3>
<canvas id="chart"></canvas>
</div>

<div class="card">
<h3>📦 Tạo QR / Barcode</h3>
<input id="codeInput" placeholder="Nhập mã vận đơn">
<button onclick="createCode()">Tạo</button>
<br><br>
<svg id="barcode"></svg>
<br>
<canvas id="qr"></canvas>
</div>

<div class="card">
<h3>📍 Map shop</h3>
<input id="shopAddress" placeholder="Nhập địa chỉ shop">
<button onclick="openMap()">Mở map</button>
</div>

</div>

<script>

let queue=[]
let orders=JSON.parse(localStorage.getItem("orders")||"[]")

function beep(){
let audio=new Audio("https://actions.google.com/sounds/v1/cartoon/pop.ogg")
audio.play()
navigator.vibrate(200)
}

function startScan(){

Quagga.init({

inputStream:{
type:"LiveStream",
target:document.querySelector('#scanner'),
constraints:{
facingMode:"environment",
focusMode:"continuous"
}
},

decoder:{
readers:[
"code_128_reader",
"ean_reader",
"ean_8_reader",
"upc_reader",
"qr_reader"
]
}

},function(err){

if(!err){
Quagga.start()
}

})

Quagga.onDetected(function(data){

let code=data.codeResult.code

beep()

if(!queue.includes(code)){
queue.push(code)
drawQueue()
}

})

}

function stopScan(){
Quagga.stop()
}

function drawQueue(){

let html=""

queue.forEach(c=>{
html+=`<tr><td>${c}</td></tr>`
})

document.getElementById("queue").innerHTML=html

}

function confirmScan(){

queue.forEach(code=>{

let o=orders.find(a=>a.code==code)

if(!o){

orders.push({
code:code,
status:"CHUA LAY",
date:new Date().toLocaleDateString()
})

}else{

o.status="DA LAY"

}

})

queue=[]

save()

}

function save(){

localStorage.setItem("orders",JSON.stringify(orders))

drawOrders()

updateChart()

}

function drawOrders(){

let html=""

orders.forEach((o,i)=>{

html+=`

<tr>

<td>${o.code}</td>

<td>${o.status}</td>

<td>${o.date}</td>

<td>
<button onclick="delOrder(${i})">Xóa</button>
</td>

</tr>

`

})

document.getElementById("orders").innerHTML=html

}

function delOrder(i){

orders.splice(i,1)

save()

}

function updateChart(){

let da=orders.filter(o=>o.status=="DA LAY").length
let chua=orders.filter(o=>o.status=="CHUA LAY").length

new Chart(
document.getElementById("chart"),
{
type:"doughnut",
data:{
labels:["Đã lấy","Chưa lấy"],
datasets:[{data:[da,chua]}]
}
})

}

function createCode(){

let code=document.getElementById("codeInput").value

JsBarcode("#barcode",code)

QRCode.toCanvas(document.getElementById("qr"),code)

}

function openMap(){

let a=document.getElementById("shopAddress").value

window.open("https://www.google.com/maps/search/"+a)

}

drawOrders()
updateChart()

</script>

</body>
</html>
