<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>SPRINTER</title>

<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdn.jsdelivr.net/npm/jsbarcode"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#0b1220;
color:white;
}

header{
background:#ff0033;
padding:15px;
text-align:center;
font-size:20px;
}

.container{
max-width:500px;
margin:auto;
padding:10px;
}

.card{
background:#1e293b;
padding:12px;
border-radius:12px;
margin-bottom:10px;
}

button{
background:#ff0033;
border:none;
padding:8px 12px;
border-radius:8px;
color:white;
}

input{
padding:8px;
border-radius:8px;
border:none;
}

.order{
display:flex;
justify-content:space-between;
padding:6px;
border-bottom:1px solid #334155;
}

</style>

</head>

<body>

<header>SPRINTER Tool by Cao Cường</header>

<div class="container">

<div class="card">

<h3>📷 Scan đơn</h3>

<button onclick="startScan()">Bật camera</button>
<button onclick="stopScan()">Tắt camera</button>

<div id="reader"></div>

</div>

<div class="card">

<h3>➕ Thêm đơn</h3>

<input id="manual">

<button onclick="addManual()">Thêm</button>

</div>

<div class="card">

<h3>📦 Đơn hôm nay</h3>

<div id="orders"></div>

</div>

<div class="card">

<h3>📅 Ngày đã quét</h3>

<div id="days"></div>

</div>

<div class="card">

<h3>📜 Lịch sử hoạt động</h3>

<div id="history"></div>

</div>

<div class="card">

<h3>🧾 Tạo QR + Barcode</h3>

<input id="code">

<button onclick="createCode()">Tạo</button>

<div id="qr"></div>

<svg id="barcode"></svg>

</div>

<div class="card">

<h3>📊 Dashboard</h3>

<canvas id="chart"></canvas>

</div>

</div>

<script>

let data=JSON.parse(localStorage.getItem("sprinter")||"{}")
let history=JSON.parse(localStorage.getItem("history")||"[]")

function today(){

return new Date().toISOString().slice(0,10)

}

function getOrders(){

let d=today()

if(!data[d])data[d]=[]

return data[d]

}

function save(){

localStorage.setItem("sprinter",JSON.stringify(data))
localStorage.setItem("history",JSON.stringify(history))

}

function beep(){

let a=new Audio("https://actions.google.com/sounds/v1/cartoon/pop.ogg")

a.play()

navigator.vibrate(200)

}

function addHistory(text){

history.unshift({

time:new Date().toLocaleString(),
text:text

})

save()

renderHistory()

}

function processOrder(code){

let orders=getOrders()

let found=orders.find(o=>o.code===code)

if(found){

found.taken=true

addHistory("Đã lấy "+code)

}else{

orders.push({

code:code,
taken:false

})

addHistory("Nhập đơn "+code)

}

beep()

save()

render()

}

function addManual(){

let code=document.getElementById("manual").value

processOrder(code)

}

function render(){

let box=document.getElementById("orders")

box.innerHTML=""

getOrders().forEach(o=>{

let div=document.createElement("div")

div.className="order"

div.innerHTML=

o.code+" "+(o.taken?"✅":"⏳")

box.appendChild(div)

})

updateChart()

renderDays()

}

function renderDays(){

let box=document.getElementById("days")

box.innerHTML=""

Object.keys(data).reverse().forEach(d=>{

let btn=document.createElement("button")

btn.innerText=d

btn.onclick=()=>showDay(d)

box.appendChild(btn)

})

}

function showDay(day){

let box=document.getElementById("orders")

box.innerHTML=""

data[day].forEach(o=>{

let div=document.createElement("div")

div.innerText=o.code+(o.taken?" ✅":" ⏳")

box.appendChild(div)

})

}

function renderHistory(){

let box=document.getElementById("history")

box.innerHTML=""

history.slice(0,20).forEach(h=>{

let div=document.createElement("div")

div.innerText=h.time+" - "+h.text

box.appendChild(div)

})

}

function createCode(){

let code=document.getElementById("code").value

document.getElementById("qr").innerHTML=""

new QRCode(document.getElementById("qr"),code)

JsBarcode("#barcode",code)

}

let scanner
let last=""

function startScan(){

scanner=new Html5Qrcode("reader")

scanner.start(

{facingMode:"environment"},

{fps:60,qrbox:250},

(code)=>{

if(code===last)return

last=code

processOrder(code)

}

)

}

function stopScan(){

if(scanner)scanner.stop()

}

let chart=new Chart(

document.getElementById("chart"),

{

type:"doughnut",

data:{

labels:["Đã lấy","Chưa lấy"],

datasets:[{data:[0,0]}]

}

}

)

function updateChart(){

let orders=getOrders()

let taken=orders.filter(o=>o.taken).length

chart.data.datasets[0].data=[taken,orders.length-taken]

chart.update()

}

render()
renderHistory()

</script>

</body>
</html>
