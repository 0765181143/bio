<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>SPRINTER</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">

<link rel="apple-touch-icon" href="icon-192.png">

<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdn.jsdelivr.net/npm/jsbarcode"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

header{
background:#ff0033;
padding:16px;
text-align:center;
font-size:22px;
}

.section{
background:#1e293b;
margin:10px;
padding:12px;
border-radius:12px;
}

button{
background:#ff0033;
border:none;
padding:8px 12px;
border-radius:8px;
color:white;
}

input{
padding:8px;
border-radius:8px;
border:none;
}

.order{
display:flex;
justify-content:space-between;
padding:6px;
border-bottom:1px solid #334155;
}

</style>

</head>

<body>

<header>

SPRINTER  
Tool by Cao Cường

</header>

<div class="section">

<h3>📷 Scan đơn</h3>

<button onclick="startScan()">Bật camera</button>
<button onclick="stopScan()">Tắt camera</button>

<div id="reader"></div>

</div>

<div class="section">

<h3>➕ Thêm đơn</h3>

<input id="manualCode" placeholder="Mã vận đơn">

<button onclick="addManual()">Thêm</button>

</div>

<div class="section">

<h3>🔍 Tìm đơn</h3>

<input id="search" onkeyup="searchOrder()" placeholder="Tìm mã">

</div>

<div class="section">

<h3>📦 Danh sách đơn</h3>

<div id="orders"></div>

</div>

<div class="section">

<h3>🧾 Tạo QR + Barcode</h3>

<input id="genCode" placeholder="Nhập mã">

<button onclick="generate()">Tạo</button>

<div id="qr"></div>

<svg id="barcode"></svg>

</div>

<div class="section">

<h3>📊 Thống kê</h3>

<canvas id="chart"></canvas>

</div>

<script>

let orders=JSON.parse(localStorage.orders||"[]")

function save(){

localStorage.orders=JSON.stringify(orders)

}

function addOrder(code){

let found=orders.find(o=>o.code==code)

if(found){

found.taken=true

}else{

orders.push({
code:code,
taken:false,
date:new Date().toLocaleDateString()
})

}

navigator.vibrate(200)

save()

render()

}

function addManual(){

let code=document.getElementById("manualCode").value

addOrder(code)

}

function deleteOrder(code){

orders=orders.filter(o=>o.code!=code)

save()

render()

}

function render(){

let box=document.getElementById("orders")

box.innerHTML=""

orders.forEach(o=>{

let div=document.createElement("div")

div.className="order"

div.innerHTML=

o.code+" "+(o.taken?"✅":"⏳")+

`<button onclick="deleteOrder('${o.code}')">X</button>`

box.appendChild(div)

})

updateDash()

}

function searchOrder(){

let key=document.getElementById("search").value

let box=document.getElementById("orders")

box.innerHTML=""

orders.filter(o=>o.code.includes(key)).forEach(o=>{

let div=document.createElement("div")

div.innerText=o.code

box.appendChild(div)

})

}

function generate(){

let code=document.getElementById("genCode").value

document.getElementById("qr").innerHTML=""

new QRCode(document.getElementById("qr"),code)

JsBarcode("#barcode",code)

}

let scanner

function startScan(){

scanner=new Html5Qrcode("reader")

scanner.start(
{facingMode:"environment"},
{fps:30,qrbox:250},
code=>addOrder(code)
)

}

function stopScan(){

if(scanner)scanner.stop()

}

let chart=new Chart(
document.getElementById("chart"),
{
type:"doughnut",
data:{
labels:["Đã lấy","Chưa lấy"],
datasets:[{data:[0,0]}]
}
}
)

function updateDash(){

let taken=orders.filter(o=>o.taken).length

chart.data.datasets[0].data=[taken,orders.length-taken]

chart.update()

}

render()

</script>

</body>

</html>
