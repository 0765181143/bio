<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SPRINTER ULTRA PRO MAX AI</title>

<!-- AI + Scanner -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.16.0"></script>
<script src="https://cdn.jsdelivr.net/npm/@zxing/library@latest"></script>

<!-- Charts / Codes -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsbarcode"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>
body{margin:0;font-family:-apple-system,BlinkMacSystemFont;background:#0f172a;color:#fff}
header{background:#111827;padding:14px;text-align:center;font-size:20px;font-weight:700}
nav{display:flex;background:#1e293b}
nav button{flex:1;padding:12px;background:none;border:none;color:#fff;font-size:14px}
.section{display:none;padding:14px}
.active{display:block}
.card{background:#1e293b;border-radius:12px;padding:14px;margin-bottom:12px}
video{width:100%;border-radius:10px;background:#000}
button{background:#2563eb;border:none;color:#fff;padding:10px 12px;border-radius:8px;margin:4px}
input{width:100%;padding:10px;border-radius:8px;border:none;margin-top:8px}
table{width:100%;border-collapse:collapse}
td{padding:6px;border-bottom:1px solid #334155;font-size:14px}
.badge{padding:3px 6px;border-radius:6px;font-size:12px}
.ok{background:#065f46}
.wait{background:#7c2d12}
#scanBox{position:relative}
#guide{
 position:absolute;left:10%;top:20%;width:80%;height:40%;
 border:3px solid #22c55e;border-radius:12px;pointer-events:none
}
</style>
</head>

<body>

<header>SPRINTER ULTRA PRO MAX AI</header>

<nav>
<button onclick="show('scan')">SCAN</button>
<button onclick="show('orders')">ORDERS</button>
<button onclick="show('dashboard')">DASHBOARD</button>
<button onclick="show('generate')">QR / BARCODE</button>
<button onclick="show('history')">HISTORY</button>
<button onclick="show('print')">PRINT</button>
</nav>

<!-- SCAN -->
<div id="scan" class="section active">
<div class="card">
<h3>AI Camera Scanner</h3>
<div id="scanBox">
<video id="video" playsinline></video>
<div id="guide"></div>
</div>
<br>
<button onclick="startScan()">Start</button>
<button onclick="stopScan()">Stop</button>
<button onclick="toggleFlash()">Flash</button>
</div>

<div class="card">
<h3>Danh sách chờ xác nhận</h3>
<table id="queue"></table>
<button onclick="confirmOrders()">Xác nhận đơn</button>
</div>
</div>

<!-- ORDERS -->
<div id="orders" class="section">
<div class="card">
<h3>Danh sách đơn</h3>
<table id="ordersTable"></table>
</div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="section">
<div class="card">
<h3>Thống kê</h3>
<canvas id="chart"></canvas>
</div>
</div>

<!-- GENERATE -->
<div id="generate" class="section">
<div class="card">
<h3>Tạo QR + Barcode</h3>
<input id="codeInput" placeholder="Nhập mã vận đơn">
<button onclick="createCode()">Tạo</button>
<svg id="barcode"></svg>
<canvas id="qr"></canvas>
</div>
</div>

<!-- HISTORY -->
<div id="history" class="section">
<div class="card">
<h3>Lịch sử hoạt động</h3>
<table id="historyTable"></table>
</div>
</div>

<!-- PRINT -->
<div id="print" class="section">
<div class="card">
<h3>In tem 100×150</h3>
<input id="printCode" placeholder="Nhập mã cần in">
<button onclick="printLabel()">In tem</button>
<div id="label"></div>
</div>
</div>

<script>
let codeReader=new ZXing.BrowserMultiFormatReader()
let video=document.getElementById("video")
let queue=[]
let orders=JSON.parse(localStorage.getItem("orders")||"[]")
let history=JSON.parse(localStorage.getItem("history")||"[]")

function show(id){
 document.querySelectorAll(".section").forEach(x=>x.classList.remove("active"))
 document.getElementById(id).classList.add("active")
}

function beep(){
 let a=new Audio("https://actions.google.com/sounds/v1/cartoon/pop.ogg")
 a.play()
 if(navigator.vibrate)navigator.vibrate(200)
}

async function startScan(){
 const devices=await ZXing.BrowserMultiFormatReader.listVideoInputDevices()
 let deviceId=devices[devices.length-1].deviceId

 codeReader.decodeFromVideoDevice(deviceId,'video',(result,err)=>{
  if(result){
   beep()
   let code=result.text
   if(!queue.includes(code)){
    queue.push(code)
    drawQueue()
   }
  }
 })
}

function stopScan(){ codeReader.reset() }

function toggleFlash(){
 let track=video.srcObject?.getVideoTracks?.()[0]
 if(!track)return
 let cap=track.getCapabilities()
 if(cap.torch){
  track.applyConstraints({advanced:[{torch:true}]})
 }
}

function drawQueue(){
 let html=""
 queue.forEach(x=>{ html+=`<tr><td>${x}</td></tr>` })
 document.getElementById("queue").innerHTML=html
}

function confirmOrders(){
 queue.forEach(code=>{
  let o=orders.find(x=>x.code==code)
  if(!o){
   orders.push({code:code,status:"CHUA LAY",date:new Date().toLocaleDateString()})
   history.push({code:code,action:"Quét lần đầu",time:new Date().toLocaleString()})
  }else{
   o.status="DA LAY"
   history.push({code:code,action:"Đã lấy",time:new Date().toLocaleString()})
  }
 })
 queue=[]
 save()
}

function save(){
 localStorage.setItem("orders",JSON.stringify(orders))
 localStorage.setItem("history",JSON.stringify(history))
 drawOrders();drawHistory();updateChart()
}

function drawOrders(){
 let html=""
 orders.forEach((o,i)=>{
  html+=`<tr>
  <td>${o.code}</td>
  <td><span class="badge ${o.status=="DA LAY"?"ok":"wait"}">${o.status}</span></td>
  <td>${o.date}</td>
  <td><button onclick="del(${i})">X</button></td>
  </tr>`
 })
 document.getElementById("ordersTable").innerHTML=html
}

function del(i){ orders.splice(i,1); save() }

function drawHistory(){
 let html=""
 history.forEach(h=>{
  html+=`<tr><td>${h.code}</td><td>${h.action}</td><td>${h.time}</td></tr>`
 })
 document.getElementById("historyTable").innerHTML=html
}

function updateChart(){
 let da=orders.filter(o=>o.status=="DA LAY").length
 let chua=orders.filter(o=>o.status=="CHUA LAY").length
 new Chart(document.getElementById("chart"),{
  type:"doughnut",
  data:{labels:["Đã lấy","Chưa lấy"],datasets:[{data:[da,chua]}]}
 })
}

function createCode(){
 let code=document.getElementById("codeInput").value
 JsBarcode("#barcode",code)
 QRCode.toCanvas(document.getElementById("qr"),code)
}

function printLabel(){
 let code=document.getElementById("printCode").value
 let html=`
 <div style="width:100mm;height:150mm;border:1px solid #000;padding:10px;color:#000;background:#fff">
 <h2>SPRINTER</h2>
 <svg id="pbar"></svg>
 <div>${code}</div>
 </div>`
 document.getElementById("label").innerHTML=html
 JsBarcode("#pbar",code)
 window.print()
}

drawOrders();drawHistory();updateChart()
</script>

</body>
</html>
