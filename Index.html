<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Shipper Tool</title>

<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>

<style>

body{
font-family:Arial;
background:#101323;
color:white;
margin:0;
}

header{
background:#ff0033;
padding:12px;
font-weight:bold;
text-align:center;
}

.container{
padding:10px;
max-width:600px;
margin:auto;
}

.card{
background:#1a1e34;
padding:12px;
border-radius:10px;
margin-bottom:12px;
}

input,button{
padding:8px;
margin:4px;
border:none;
border-radius:6px;
}

button{
cursor:pointer;
}

#reader{
width:100%;
}

.item{
background:#11142a;
padding:8px;
margin-top:6px;
border-radius:6px;
display:flex;
justify-content:space-between;
align-items:center;
}

.done{
color:#4cff6a;
}

.todo{
color:#ffcc00;
}

#toast{
position:fixed;
top:15px;
left:50%;
transform:translateX(-50%);
background:#333;
padding:10px 15px;
border-radius:8px;
display:none;
}

</style>

</head>

<body>

<header>Shipper Tool</header>

<div class="container">

<div class="card">

<h3>📷 Quét đơn</h3>

<div id="reader"></div>

</div>

<div class="card">

<h3>➕ Thêm mã vận đơn</h3>

<input id="codeInput" placeholder="Nhập mã vận đơn">

<button onclick="addOrder()">Thêm</button>

</div>

<div class="card">

<h3>🔳 Tạo QR + Barcode</h3>

<input id="genCode" placeholder="Nhập mã vận đơn">

<button onclick="createCode()">Tạo</button>

<h4>QR Code</h4>

<div id="qrcode"></div>

<h4>Barcode</h4>

<svg id="barcode"></svg>

</div>

<div class="card">

<h3>📦 Danh sách đơn</h3>

<div id="list"></div>

</div>

</div>

<div id="toast"></div>

<script>

let orders=JSON.parse(localStorage.getItem("orders")||"[]")

function save(){

localStorage.setItem("orders",JSON.stringify(orders))

}

function toast(text){

let box=document.getElementById("toast")

box.innerText=text

box.style.display="block"

setTimeout(()=>{

box.style.display="none"

},1500)

}

function addOrder(){

let code=document.getElementById("codeInput").value

if(!code) return

orders.push({

code:code,

done:false

})

save()

update()

}

function toggle(code){

let o=orders.find(x=>x.code===code)

if(o){

o.done=true

toast("Đã lấy "+code)

}

save()

update()

}

function del(code){

orders=orders.filter(x=>x.code!==code)

save()

update()

}

function update(){

let list=document.getElementById("list")

list.innerHTML=""

orders.forEach(o=>{

let div=document.createElement("div")

div.className="item"

div.innerHTML=

"<span>"+o.code+"</span>"+

"<span class='"+(o.done?"done":"todo")+"'>"+

(o.done?"Đã lấy":"Chưa")+

"</span>"+

"<button onclick=\"toggle('"+o.code+"')\">✓</button>"+

"<button onclick=\"del('"+o.code+"')\">X</button>"

list.appendChild(div)

})

}

function createCode(){

let text=document.getElementById("genCode").value

if(!text) return

let qr=document.getElementById("qrcode")

qr.innerHTML=""

new QRCode(qr,{

text:text,

width:200,

height:200

})

JsBarcode("#barcode",text,{

format:"CODE128",

width:2,

height:80,

displayValue:true

})

}

function onScanSuccess(code){

let o=orders.find(x=>x.code===code)

if(o){

o.done=true

toast("Đã lấy "+code)

}else{

orders.push({

code:code,

done:true

})

toast("Đơn mới "+code)

}

save()

update()

}

let scanner=new Html5QrcodeScanner(

"reader",

{

fps:30,

qrbox:220

}

)

scanner.render(onScanSuccess)

update()

</script>

</body>

</html>
