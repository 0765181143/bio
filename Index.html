<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>SPRINTER</title>

<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdn.jsdelivr.net/npm/jsbarcode"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs/qrcode.min.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#f1f5f9;
}

header{
background:linear-gradient(90deg,#ff3d00,#ff9100);
color:white;
padding:15px;
text-align:center;
font-size:22px;
font-weight:bold;
}

.dashboard{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
padding:10px;
}

.card{
background:white;
padding:15px;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.15);
text-align:center;
font-size:18px;
}

.section{
background:white;
margin:10px;
padding:12px;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.order{
padding:8px;
border-bottom:1px solid #eee;
}

button{
background:#ff3d00;
color:white;
border:none;
padding:10px;
border-radius:8px;
margin-top:5px;
}

#reader{
width:100%;
}

</style>

</head>

<body>

<header>

SPRINTER  
<p style="font-size:12px">Tool by Cao Cường</p>

</header>

<div class="dashboard">

<div class="card">
Tổng đơn<br>
<span id="total">0</span>
</div>

<div class="card">
Đã lấy<br>
<span id="taken">0</span>
</div>

<div class="card">
Chưa lấy<br>
<span id="pending">0</span>
</div>

</div>

<div class="section">

<h3>📷 Quét vận đơn</h3>

<button onclick="toggleFlash()">🔦 Flash</button>

<div id="reader"></div>

</div>

<div class="section">

<h3>📦 Danh sách đơn</h3>

<div id="orders"></div>

</div>

<div class="section">

<h3>🧾 In tem vận đơn</h3>

<input id="code" placeholder="Mã vận đơn">

<input id="shop" placeholder="Tên shop">

<input id="address" placeholder="Địa chỉ">

<br>

<button onclick="printLabel()">In tem</button>

<div id="label"></div>

</div>

<script>

let orders=[]

let beep=new Audio("https://actions.google.com/sounds/v1/cartoon/pop.ogg")

function addOrder(code){

let found=orders.find(o=>o.code==code)

if(found){

found.taken=true

}else{

orders.push({code:code,taken:false})

}

update()

beep.play()

navigator.vibrate(200)

}

function update(){

document.getElementById("orders").innerHTML=""

orders.forEach(o=>{

let div=document.createElement("div")

div.className="order"

div.innerText=o.code+" "+(o.taken?"✅":"⏳")

document.getElementById("orders").appendChild(div)

})

document.getElementById("total").innerText=orders.length

let taken=orders.filter(o=>o.taken).length

document.getElementById("taken").innerText=taken

document.getElementById("pending").innerText=orders.length-taken

}

function scanSuccess(text){

addOrder(text)

}

let scanner=new Html5Qrcode("reader")

Html5Qrcode.getCameras().then(devices=>{

let cam=devices[devices.length-1].id

scanner.start(

cam,

{

fps:120,

qrbox:300

},

scanSuccess

)

})

let flash=false

async function toggleFlash(){

try{

flash=!flash

await scanner.applyVideoConstraints({

advanced:[{torch:flash}]

})

}catch(e){

alert("Camera không hỗ trợ flash")

}

}

function printLabel(){

let code=document.getElementById("code").value

let shop=document.getElementById("shop").value

let address=document.getElementById("address").value

document.getElementById("label").innerHTML=`

<div id="printArea" style="width:100mm;height:150mm;border:2px solid black;padding:10px;font-family:Arial">

<h2>SPRINTER</h2>

<p>${shop}</p>

<p>${address}</p>

<p>Mã vận đơn</p>

<svg id="barcode"></svg>

<div id="qr"></div>

</div>

`

JsBarcode("#barcode",code,{width:2,height:80})

new QRCode(document.getElementById("qr"),code)

setTimeout(()=>{

window.print()

},500)

}

</script>

</body>

</html>
