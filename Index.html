<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SPRINTER</title>

<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdn.jsdelivr.net/npm/jsbarcode"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#eef2f7;
}

header{
background:linear-gradient(90deg,#ff3d00,#ff9100);
color:white;
padding:16px;
text-align:center;
font-size:22px;
}

.dashboard{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
padding:10px;
}

.card{
background:white;
padding:15px;
border-radius:10px;
text-align:center;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.section{
background:white;
margin:10px;
padding:12px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

button{
background:#ff3d00;
color:white;
border:none;
padding:6px 12px;
border-radius:6px;
margin:3px;
}

input{
padding:6px;
margin:3px;
width:150px;
}

.order{
display:flex;
justify-content:space-between;
border-bottom:1px solid #eee;
padding:6px;
}

#reader{
width:100%;
}

</style>
</head>

<body>

<header>
SPRINTER  
<div style="font-size:12px">Tool by Cao Cường</div>
</header>

<div class="dashboard">

<div class="card">
Tổng<br><span id="total">0</span>
</div>

<div class="card">
Đã lấy<br><span id="taken">0</span>
</div>

<div class="card">
Chưa lấy<br><span id="pending">0</span>
</div>

</div>

<div class="section">

<h3>📷 Scan vận đơn</h3>

<button onclick="startScan()">Bật camera</button>
<button onclick="stopScan()">Tắt camera</button>
<button onclick="toggleFlash()">Flash</button>

<div id="reader"></div>

</div>

<div class="section">

<h3>📦 Nhập đơn</h3>

<input id="manualCode" placeholder="Mã vận đơn">
<button onclick="addManual()">Thêm</button>

<input id="search" placeholder="Tìm đơn" onkeyup="searchOrder()">

<div id="orders"></div>

</div>

<div class="section">

<h3>📜 Lịch sử hoạt động</h3>

<div id="history"></div>

</div>

<div class="section">

<h3>🧾 Tạo QR / Barcode</h3>

<input id="genCode" placeholder="Mã vận đơn">
<button onclick="generateCode()">Tạo</button>

<div id="qr"></div>
<svg id="barcode"></svg>

</div>

<div class="section">

<h3>📍 Map shop</h3>

<input id="mapAddress" placeholder="Địa chỉ shop">
<button onclick="openMap()">Mở bản đồ</button>

</div>

<div class="section">

<h3>🖨 In tem vận đơn</h3>

<input id="pcode" placeholder="Mã">
<input id="pshop" placeholder="Shop">
<input id="paddr" placeholder="Địa chỉ">

<button onclick="printLabel()">In tem</button>

<div id="print"></div>

</div>

<div class="section">

<h3>📊 Dashboard</h3>

<canvas id="chart"></canvas>

</div>

<script>

let orders=JSON.parse(localStorage.orders||"[]")
let history=JSON.parse(localStorage.history||"[]")

function save(){
localStorage.orders=JSON.stringify(orders)
localStorage.history=JSON.stringify(history)
}

function log(action,code){
history.unshift({
time:new Date().toLocaleString(),
action:action,
code:code
})
save()
renderHistory()
}

function addOrder(code){

let order=orders.find(o=>o.code==code)

if(order){
order.taken=true
log("Đã lấy",code)
}else{
orders.push({
code:code,
taken:false,
date:new Date().toLocaleDateString()
})
log("Nhập đơn",code)
}

beep()
navigator.vibrate(200)

save()
render()

}

function addManual(){
let code=document.getElementById("manualCode").value
addOrder(code)
}

function confirmOrder(code){

let order=orders.find(o=>o.code==code)
order.taken=true

log("Xác nhận thủ công",code)

save()
render()

}

function deleteOrder(code){

orders=orders.filter(o=>o.code!=code)

log("Xóa đơn",code)

save()
render()

}

function render(){

let box=document.getElementById("orders")
box.innerHTML=""

orders.forEach(o=>{

let div=document.createElement("div")
div.className="order"

div.innerHTML=
o.code+" "+(o.taken?"✅":"⏳")+

` <span>
<button onclick="confirmOrder('${o.code}')">✔</button>
<button onclick="deleteOrder('${o.code}')">🗑</button>
</span>`

box.appendChild(div)

})

updateDash()

}

function updateDash(){

document.getElementById("total").innerText=orders.length

let taken=orders.filter(o=>o.taken).length

document.getElementById("taken").innerText=taken
document.getElementById("pending").innerText=orders.length-taken

chart.data.datasets[0].data=[taken,orders.length-taken]
chart.update()

}

function renderHistory(){

let box=document.getElementById("history")
box.innerHTML=""

history.slice(0,20).forEach(h=>{
let div=document.createElement("div")
div.innerText=h.time+" | "+h.action+" | "+h.code
box.appendChild(div)
})

}

function searchOrder(){

let key=document.getElementById("search").value

let box=document.getElementById("orders")
box.innerHTML=""

orders.filter(o=>o.code.includes(key)).forEach(o=>{

let div=document.createElement("div")
div.className="order"
div.innerText=o.code

box.appendChild(div)

})

}

function generateCode(){

let code=document.getElementById("genCode").value

document.getElementById("qr").innerHTML=""

new QRCode(document.getElementById("qr"),code)

JsBarcode("#barcode",code)

}

function openMap(){

let addr=document.getElementById("mapAddress").value
window.open("https://www.google.com/maps/search/"+addr)

}

function beep(){
new Audio("https://actions.google.com/sounds/v1/cartoon/pop.ogg").play()
}

function printLabel(){

let code=document.getElementById("pcode").value
let shop=document.getElementById("pshop").value
let addr=document.getElementById("paddr").value

document.getElementById("print").innerHTML=

`
<div style="width:100mm;height:150mm;border:2px solid black;padding:10px">

<h2>SPRINTER</h2>

<p>${shop}</p>
<p>${addr}</p>

<svg id="pbarcode"></svg>
<div id="pqr"></div>

</div>
`

JsBarcode("#pbarcode",code)

new QRCode(document.getElementById("pqr"),code)

setTimeout(()=>window.print(),500)

}

let scanner
let cameraId

Html5Qrcode.getCameras().then(devices=>{
cameraId=devices[devices.length-1].id
})

function startScan(){
scanner=new Html5Qrcode("reader")
scanner.start(cameraId,{fps:30,qrbox:250},scanSuccess)
}

function stopScan(){
if(scanner){scanner.stop()}
}

function scanSuccess(code){
addOrder(code)
}

let flash=false

async function toggleFlash(){

flash=!flash

await scanner.applyVideoConstraints({
advanced:[{torch:flash}]
})

}

let chart=new Chart(
document.getElementById("chart"),
{
type:"doughnut",
data:{
labels:["Đã lấy","Chưa lấy"],
datasets:[{data:[0,0]}]
}
}
)

render()
renderHistory()

</script>

</body>
</html>
