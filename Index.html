<!DOCTYPE html>
<html lang="vi">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>SPRINTER</title>

<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>

<style>

body{
margin:0;
font-family:-apple-system;
background:#0c1022;
color:white;
}

header{
background:linear-gradient(90deg,#ff0033,#ff6600);
padding:15px;
text-align:center;
font-size:22px;
}

.creator{
font-size:12px;
opacity:0.8;
}

.container{
max-width:800px;
margin:auto;
padding:10px;
}

.card{
background:#161a33;
padding:12px;
border-radius:12px;
margin-bottom:12px;
}

input,select,button{
padding:10px;
border-radius:8px;
border:none;
margin:4px;
}

button{
background:#ff0033;
color:white;
}

.tab{
display:inline-block;
background:#1c2147;
padding:10px;
margin:4px;
border-radius:6px;
cursor:pointer;
}

.order{
display:flex;
justify-content:space-between;
background:#070a18;
padding:6px;
margin-top:4px;
border-radius:6px;
}

.stat{
display:flex;
justify-content:space-around;
font-size:18px;
}

#reader{
width:100%;
}

.shop{
display:flex;
align-items:center;
margin-top:4px;
}

.shop img{
width:30px;
height:30px;
border-radius:6px;
margin-right:8px;
}

</style>

</head>

<body>

<header>

SPRINTER

<div class="creator">
Tool by Cao Cường
</div>

</header>

<div class="container">

<div>

<span class="tab" onclick="showTab('dashboard')">Dashboard</span>
<span class="tab" onclick="showTab('pickup')">Pickup</span>
<span class="tab" onclick="showTab('shops')">Shop</span>
<span class="tab" onclick="showTab('create')">QR / Barcode</span>
<span class="tab" onclick="showTab('logs')">Lịch sử</span>

</div>

<div id="dashboard">

<div class="card">

<h3>📊 Thống kê hôm nay</h3>

<div class="stat">

<div>Tổng<br><span id="total">0</span></div>
<div>Đã lấy<br><span id="done">0</span></div>
<div>Shop<br><span id="shopCount">0</span></div>

</div>

</div>

</div>

<div id="pickup" style="display:none">

<div class="card">

<h3>📷 Scan vận đơn</h3>

<div id="reader"></div>

</div>

<div class="card">

<h3>📦 Thêm đơn</h3>

<select id="shopSelect"></select>

<input id="orderInput" placeholder="Mã vận đơn">

<button onclick="addOrder()">Thêm</button>

</div>

<div class="card">

<h3>Danh sách đơn</h3>

<div id="orderList"></div>

</div>

</div>

<div id="shops" style="display:none">

<div class="card">

<h3>🏪 Thêm shop</h3>

<input id="shopName" placeholder="Tên shop">

<input id="shopLogo" placeholder="Link logo">

<button onclick="addShop()">Thêm</button>

</div>

<div class="card">

<div id="shopList"></div>

</div>

</div>

<div id="create" style="display:none">

<div class="card">

<h3>🔳 Tạo QR + Barcode</h3>

<input id="codeInput" placeholder="Nhập mã">

<button onclick="createCode()">Tạo</button>

<div id="qrcode"></div>

<svg id="barcode"></svg>

</div>

<div class="card">

<h3>📦 Tạo hàng loạt</h3>

<textarea id="bulk" placeholder="mỗi dòng 1 mã"></textarea>

<button onclick="bulkCreate()">Tạo</button>

<div id="bulkResult"></div>

</div>

</div>

<div id="logs" style="display:none">

<div class="card">

<h3>📜 Lịch sử hoạt động</h3>

<div id="logList"></div>

</div>

</div>

</div>

<script>

let today=new Date().toDateString()

let db=JSON.parse(localStorage.getItem("sprinter")||"{}")

if(!db[today]){

db[today]={shops:[],orders:[]}

}

function save(){

localStorage.setItem("sprinter",JSON.stringify(db))

}

let logs=JSON.parse(localStorage.getItem("logs")||"[]")

function log(t){

logs.unshift(new Date().toLocaleTimeString()+" "+t)

localStorage.setItem("logs",JSON.stringify(logs))

renderLogs()

}

function renderLogs(){

let box=document.getElementById("logList")

box.innerHTML=""

logs.forEach(l=>{

box.innerHTML+="<div>"+l+"</div>"

})

}

function addShop(){

let name=document.getElementById("shopName").value

let logo=document.getElementById("shopLogo").value

db[today].shops.push({name:name,logo:logo})

save()

log("Thêm shop "+name)

update()

}

function addOrder(){

let shop=document.getElementById("shopSelect").value

let code=document.getElementById("orderInput").value

db[today].orders.push({shop:shop,code:code})

save()

log("Thêm đơn "+code)

update()

}

function delOrder(code){

db[today].orders=db[today].orders.filter(o=>o.code!==code)

save()

log("Xoá đơn "+code)

update()

}

function update(){

let select=document.getElementById("shopSelect")

select.innerHTML=""

db[today].shops.forEach(s=>{

select.innerHTML+=`<option value="${s.name}">${s.name}</option>`

})

let list=document.getElementById("orderList")

list.innerHTML=""

db[today].orders.forEach(o=>{

list.innerHTML+=`

<div class="order">

<span>${o.code} (${o.shop})</span>

<button onclick="delOrder('${o.code}')">X</button>

</div>

`

})

let shopList=document.getElementById("shopList")

shopList.innerHTML=""

db[today].shops.forEach(s=>{

shopList.innerHTML+=`

<div class="shop">

<img src="${s.logo}">

${s.name}

</div>

`

})

document.getElementById("total").innerText=db[today].orders.length
document.getElementById("done").innerText=db[today].orders.length
document.getElementById("shopCount").innerText=db[today].shops.length

renderLogs()

}

function showTab(tab){

document.querySelectorAll("#dashboard,#pickup,#shops,#create,#logs")
.forEach(e=>e.style.display="none")

document.getElementById(tab).style.display="block"

}

function createCode(){

let t=document.getElementById("codeInput").value

document.getElementById("qrcode").innerHTML=""

new QRCode(document.getElementById("qrcode"),t)

JsBarcode("#barcode",t,{format:"CODE128"})

log("Tạo mã "+t)

}

function bulkCreate(){

let lines=document.getElementById("bulk").value.split("\n")

let box=document.getElementById("bulkResult")

box.innerHTML=""

lines.forEach(l=>{

box.innerHTML+=`<div>${l}<svg id="b${l}"></svg></div>`

JsBarcode(`#b${l}`,l)

})

log("Tạo hàng loạt "+lines.length+" mã")

}

function scanSuccess(code){

db[today].orders.push({shop:"scan",code:code})

save()

log("Scan "+code)

update()

}

let scanner=new Html5QrcodeScanner("reader",{fps:30,qrbox:220})

scanner.render(scanSuccess)

update()

</script>

</body>

</html>
