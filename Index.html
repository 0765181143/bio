<!DOCTYPE html>
<html lang="vi">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Tool sprinter by caocuong</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
font-family:-apple-system,BlinkMacSystemFont;
background:#0f1220;
color:white;
margin:0;
}

header{
background:#ff0033;
padding:14px;
text-align:center;
font-weight:bold;
}

.container{
padding:12px;
max-width:700px;
margin:auto;
}

.card{
background:#181c2f;
padding:12px;
border-radius:12px;
margin-bottom:12px;
}

input,select,button{
padding:9px;
margin:4px;
border:none;
border-radius:8px;
}

button{
background:#ff0033;
color:white;
}

.shop{
background:#10142a;
padding:8px;
border-radius:8px;
margin-top:8px;
}

.order{
background:#0c1022;
padding:6px;
margin-top:5px;
border-radius:6px;
display:flex;
justify-content:space-between;
}

</style>

</head>

<body>

<header>Shipper PRO MAX</header>

<div class="container">

<div class="card">

<h3>📷 Quét đơn</h3>

<div id="reader"></div>

</div>

<div class="card">

<h3>🏪 Thêm shop</h3>

<input id="shopName" placeholder="Tên shop">

<button onclick="addShop()">Thêm</button>

</div>

<div class="card">

<h3>📦 Thêm đơn</h3>

<select id="shopSelect"></select>

<input id="orderCode" placeholder="Mã vận đơn">

<button onclick="addOrder()">Thêm</button>

</div>

<div class="card">

<h3>📊 Danh sách shop</h3>

<div id="shopList"></div>

</div>

</div>

<script>

let shops=JSON.parse(localStorage.getItem("shops")||"[]")

function save(){

localStorage.setItem("shops",JSON.stringify(shops))

}

function addShop(){

let name=document.getElementById("shopName").value

shops.push({name:name,orders:[]})

save()

update()

}

function addOrder(){

let shopIndex=document.getElementById("shopSelect").value

let code=document.getElementById("orderCode").value

shops[shopIndex].orders.push(code)

save()

update()

}

function delOrder(shopIndex,code){

shops[shopIndex].orders=shops[shopIndex].orders.filter(x=>x!==code)

save()

update()

}

function update(){

let list=document.getElementById("shopList")

let select=document.getElementById("shopSelect")

list.innerHTML=""

select.innerHTML=""

shops.forEach((s,i)=>{

select.innerHTML+=`<option value="${i}">${s.name}</option>`

let div=document.createElement("div")

div.className="shop"

div.innerHTML=`<b>${s.name}</b> (${s.orders.length} đơn)`

s.orders.forEach(code=>{

div.innerHTML+=`

<div class="order">

<span>${code}</span>

<button onclick="delOrder(${i},'${code}')">X</button>

</div>

`

})

list.appendChild(div)

})

}

function onScanSuccess(code){

if(shops.length==0) return

shops[0].orders.push(code)

save()

update()

}

let scanner=new Html5QrcodeScanner(

"reader",

{fps:30,qrbox:220}

)

scanner.render(onScanSuccess)

update()

</script>

</body>

</html>
