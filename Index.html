<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>SPRINTER</title>

<meta name="apple-mobile-web-app-capable" content="yes">

<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdn.jsdelivr.net/npm/jsbarcode"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#0b1220;
color:white;
}

header{
background:#ff0033;
padding:15px;
text-align:center;
font-size:20px;
font-weight:bold;
}

.container{
max-width:500px;
margin:auto;
padding:10px;
}

.card{
background:#1e293b;
padding:14px;
border-radius:14px;
margin-bottom:12px;
}

button{
background:#ff0033;
border:none;
padding:8px 14px;
border-radius:8px;
color:white;
}

input{
padding:8px;
border-radius:8px;
border:none;
}

.order{
display:flex;
justify-content:space-between;
padding:6px;
border-bottom:1px solid #334155;
}

#reader{
width:100%;
border-radius:10px;
}

</style>

</head>

<body>

<header>SPRINTER Tool by Cao Cường</header>

<div class="container">

<div class="card">

<h3>📷 Scan đơn</h3>

<button onclick="startScan()">Bật camera</button>
<button onclick="stopScan()">Tắt camera</button>

<button onclick="toggleFlash()">🔦 Flash</button>

<div id="reader"></div>

</div>

<div class="card">

<h3>➕ Thêm đơn</h3>

<input id="manual" placeholder="Mã vận đơn">

<button onclick="addManual()">Thêm</button>

</div>

<div class="card">

<h3>📦 Danh sách đơn</h3>

<div id="orders"></div>

</div>

<div class="card">

<h3>🧾 QR + Barcode</h3>

<input id="code">

<button onclick="createCode()">Tạo</button>

<div id="qr"></div>

<svg id="barcode"></svg>

</div>

<div class="card">

<h3>📊 Dashboard</h3>

<canvas id="chart"></canvas>

</div>

<div class="card">

<h3>📍 Map shop</h3>

<iframe
width="100%"
height="200"
src="https://maps.google.com/maps?q=10.762622,106.660172&z=15&output=embed">
</iframe>

</div>

<div class="card">

<h3>🧾 In tem</h3>

<button onclick="printLabel()">In tem 100x150</button>

</div>

</div>

<script>

let orders=JSON.parse(localStorage.orders||"[]")

function save(){

localStorage.orders=JSON.stringify(orders)

}

function beep(){

let audio=new Audio("https://actions.google.com/sounds/v1/cartoon/pop.ogg")

audio.play()

navigator.vibrate(200)

}

function processOrder(code){

let found=orders.find(o=>o.code==code)

if(found){

found.taken=true

}else{

orders.push({
code:code,
taken:false
})

}

beep()

save()

render()

}

function addManual(){

let code=document.getElementById("manual").value

processOrder(code)

}

function deleteOrder(code){

orders=orders.filter(o=>o.code!=code)

save()

render()

}

function render(){

let box=document.getElementById("orders")

box.innerHTML=""

orders.forEach(o=>{

let div=document.createElement("div")

div.className="order"

div.innerHTML=

o.code+" "+(o.taken?"✅":"⏳")+

`<button onclick="deleteOrder('${o.code}')">X</button>`

box.appendChild(div)

})

updateChart()

}

function createCode(){

let code=document.getElementById("code").value

document.getElementById("qr").innerHTML=""

new QRCode(document.getElementById("qr"),code)

JsBarcode("#barcode",code)

}

let scanner
let last=""

function startScan(){

scanner=new Html5Qrcode("reader")

scanner.start(
{facingMode:"environment"},
{
fps:60,
qrbox:{width:320,height:220}
},
(code)=>{

if(code===last)return

last=code

processOrder(code)

}
)

}

function stopScan(){

if(scanner)scanner.stop()

}

function toggleFlash(){

if(scanner){

scanner.applyVideoConstraints({
advanced:[{torch:true}]
})

}

}

let chart=new Chart(
document.getElementById("chart"),
{
type:"doughnut",
data:{
labels:["Đã lấy","Chưa lấy"],
datasets:[{data:[0,0]}]
}
}
)

function updateChart(){

let taken=orders.filter(o=>o.taken).length

chart.data.datasets[0].data=[taken,orders.length-taken]

chart.update()

}

function printLabel(){

let code=document.getElementById("code").value

let w=window.open()

w.document.write(

`<div style="width:100mm;height:150mm;font-size:28px">

<h2>SPRINTER</h2>

${code}

<svg id="b"></svg>

</div>

<script src="https://cdn.jsdelivr.net/npm/jsbarcode"></script>

<script>

JsBarcode("#b","${code}")

window.print()

</script>`

)

}

render()

</script>

</body>
</html>
