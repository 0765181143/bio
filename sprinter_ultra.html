<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>SPRINTER</title>
<style>
body{font-family:-apple-system,system-ui;background:#0f172a;color:white;margin:0}
header{background:#ef4444;padding:14px;font-weight:bold;font-size:20px;text-align:center}
nav{display:flex;gap:8px;flex-wrap:wrap;padding:10px;background:#111827}
nav button{flex:1;padding:10px;border:0;border-radius:8px;background:#ef4444;color:white}
section{display:none;padding:15px}
section.active{display:block}
.card{background:#1f2937;padding:12px;margin:10px 0;border-radius:10px}
input,textarea{width:100%;padding:8px;border-radius:6px;border:0;margin-top:5px}
button.action{margin-top:8px;width:100%;padding:10px;background:#22c55e;border:0;border-radius:8px;color:white}
#reader{width:100%;max-width:400px;margin:auto}
table{width:100%;border-collapse:collapse}
td,th{border-bottom:1px solid #374151;padding:6px;text-align:left}
</style>

<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdn.jsdelivr.net/npm/jsbarcode"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs/qrcode.min.js"></script>
</head>

<body>

<header>SPRINTER</header>

<nav>
<button onclick="openTab('dash')">Dashboard</button>
<button onclick="openTab('scan')">Scan</button>
<button onclick="openTab('orders')">Đơn</button>
<button onclick="openTab('generate')">QR/Barcode</button>
<button onclick="openTab('history')">Lịch sử</button>
<button onclick="openTab('map')">Map Shop</button>
</nav>

<section id="dash" class="active">
<div class="card">
Tổng đơn: <b id="total">0</b><br>
Đã lấy: <b id="done">0</b><br>
Chưa lấy: <b id="pending">0</b>
</div>
</section>

<section id="scan">
<div id="reader"></div>
<button class="action" onclick="startScan()">Bật camera</button>
<button class="action" onclick="stopScan()">Tắt camera</button>
</section>

<section id="orders">
<div class="card">
<input id="manualCode" placeholder="Nhập mã đơn">
<button class="action" onclick="manualAdd()">Thêm đơn</button>
</div>

<div class="card">
<table>
<thead><tr><th>Mã</th><th>Trạng thái</th><th></th></tr></thead>
<tbody id="orderList"></tbody>
</table>
</div>
</section>

<section id="generate">
<div class="card">
<textarea id="codes" placeholder="Nhập mã mỗi dòng"></textarea>
<button class="action" onclick="generateCodes()">Tạo QR + Barcode</button>
</div>
<div id="genResult"></div>
</section>

<section id="history">
<div id="historyList"></div>
</section>

<section id="map">
<div class="card">
<input id="shopAddress" placeholder="Địa chỉ shop">
<button class="action" onclick="openMap()">Mở bản đồ</button>
</div>
</section>

<script>

let scanner
let orders=JSON.parse(localStorage.getItem("orders")||"[]")
let history=JSON.parse(localStorage.getItem("history")||"[]")

function save(){
localStorage.setItem("orders",JSON.stringify(orders))
localStorage.setItem("history",JSON.stringify(history))
}

function today(){
return new Date().toISOString().slice(0,10)
}

function openTab(id){
document.querySelectorAll("section").forEach(s=>s.classList.remove("active"))
document.getElementById(id).classList.add("active")
}

function startScan(){

scanner=new Html5Qrcode("reader")

scanner.start(
{facingMode:"environment"},
{fps:30,qrbox:250},
(code)=>{
processCode(code)
navigator.vibrate(200)
}
)

}

function stopScan(){
if(scanner) scanner.stop()
}

function processCode(code){

let found=orders.find(o=>o.code===code && o.date===today())

if(!found){

orders.push({
code:code,
status:"CHUA_LAY",
date:today()
})

history.unshift("Tạo đơn "+code)

}else{

found.status="DA_LAY"
history.unshift("Đã lấy "+code)

}

save()
render()

}

function manualAdd(){
let code=document.getElementById("manualCode").value
if(code) processCode(code)
}

function render(){

let list=document.getElementById("orderList")
list.innerHTML=""

orders.filter(o=>o.date===today()).forEach(o=>{

let tr=document.createElement("tr")

tr.innerHTML=`
<td>${o.code}</td>
<td>${o.status}</td>
<td>
<button onclick="deleteOrder('${o.code}')">X</button>
</td>
`

list.appendChild(tr)

})

let todayOrders=orders.filter(o=>o.date===today())

document.getElementById("total").innerText=todayOrders.length
document.getElementById("done").innerText=todayOrders.filter(o=>o.status==="DA_LAY").length
document.getElementById("pending").innerText=todayOrders.filter(o=>o.status==="CHUA_LAY").length

renderHistory()

}

function deleteOrder(code){
orders=orders.filter(o=>o.code!==code)
history.unshift("Xóa "+code)
save()
render()
}

function renderHistory(){

let box=document.getElementById("historyList")
box.innerHTML=""

history.slice(0,50).forEach(h=>{

let div=document.createElement("div")
div.className="card"
div.innerText=h

box.appendChild(div)

})

}

function generateCodes(){

let list=document.getElementById("codes").value.split("\n")

let box=document.getElementById("genResult")
box.innerHTML=""

list.forEach(code=>{

if(!code) return

let div=document.createElement("div")
div.className="card"

div.innerHTML=`
<b>${code}</b>
<svg id="b${code}"></svg>
<div id="q${code}"></div>
<button onclick="printLabel('${code}')">In tem</button>
`

box.appendChild(div)

JsBarcode("#b"+code,code)

new QRCode(document.getElementById("q"+code),code)

})

}

function printLabel(code){

let w=window.open()

w.document.write(`
<style>
body{font-family:Arial}
.label{width:100mm;height:150mm;text-align:center}
</style>

<div class="label">
<h2>SPRINTER</h2>
<p>${code}</p>
<svg id="barcode"></svg>
</div>

<script src="https://cdn.jsdelivr.net/npm/jsbarcode"><\/script>
<script>
JsBarcode("#barcode","${code}",{height:120})
window.print()
<\/script>
`)

}

function openMap(){

let addr=document.getElementById("shopAddress").value

window.open("https://www.google.com/maps/search/"+encodeURIComponent(addr))

}

render()

</script>

</body>
</html>
