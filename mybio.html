<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Shipper Tool</title>
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{
font-family:Arial;
background:#f2f2f2;
text-align:center;
margin:0;
}

header{
background:#e00022;
color:white;
padding:12px;
font-size:20px;
}

#reader{
width:300px;
margin:auto;
}

button{
padding:10px;
margin:5px;
border:none;
background:#e00022;
color:white;
border-radius:5px;
}

input{
padding:10px;
width:250px;
margin:5px;
}

ul{
list-style:none;
padding:0;
}

li{
background:white;
margin:5px;
padding:10px;
border-radius:5px;
}
</style>
</head>

<body>

<header>Shipper Tool</header>

<h3>Quét đơn</h3>

<div id="reader"></div>

<br>

<input id="manual" placeholder="Nhập mã vận đơn">
<button onclick="addManual()">Thêm</button>

<br>

<input id="search" placeholder="Tìm đơn" onkeyup="searchOrder()">

<h3 id="stats"></h3>

<ul id="list"></ul>

<script>

let orders = JSON.parse(localStorage.getItem("orders")) || []

function save(){
localStorage.setItem("orders",JSON.stringify(orders))
update()
}

function update(){

let list = document.getElementById("list")
list.innerHTML = ""

let done = 0

orders.forEach(o=>{

let li = document.createElement("li")

if(o.done){
li.innerHTML = o.code + " ✅ Đã lấy"
done++
}else{
li.innerHTML = o.code + " ⏳ Chưa lấy"
}

li.onclick = ()=>{
o.done = !o.done
save()
}

list.appendChild(li)

})

document.getElementById("stats").innerHTML =
"Tổng: "+orders.length+
" | Đã lấy: "+done+
" | Chưa lấy: "+(orders.length-done)

}

function addManual(){

let code = document.getElementById("manual").value

if(code=="") return

orders.push({code:code,done:false})

save()

document.getElementById("manual").value=""

}

function onScanSuccess(code){

let order = orders.find(o=>o.code==code)

if(order){

if(order.done){
alert("⚠ Đơn đã quét")
}else{
order.done=true
}

}else{

orders.push({code:code,done:true})

}

save()

}

function searchOrder(){

let text = document.getElementById("search").value.toLowerCase()

let items = document.querySelectorAll("li")

items.forEach(li=>{
if(li.innerText.toLowerCase().includes(text)){
li.style.display=""
}else{
li.style.display="none"
}
})

}

let scanner = new Html5QrcodeScanner(
"reader",
{fps:10,qrbox:250}
)

scanner.render(onScanSuccess)

update()

</script>

</body>
</html>
